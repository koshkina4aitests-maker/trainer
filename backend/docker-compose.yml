version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: trainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trainer
    ports:
      - "5432:5432"
    volumes:
      - trainer_postgres_data:/var/lib/postgresql/data

volumes:
  trainer_postgres_data:
